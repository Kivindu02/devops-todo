services:
  app:
    build: .
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://todo:todo_password@db:5432/todo
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo_password
      POSTGRES_DB: todo
    volumes:
      - todo-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  todo-data:
